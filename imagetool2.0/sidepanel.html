<!DOCTYPE html><!-- 侧边栏主界面 -->
<html>
<head>
  <meta charset="utf-8">
  <title>图片尺寸调整器2.0(SAKURA)</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <h2>图片尺寸调整器2.0(SAKURA)</h2>
    
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📁</div>
      <p>请把图片拖拽到这里喵~</p>
      <p class="drop-hint">(支持本地文件和网页图片)</p>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">
      <button id="browseButton">或点击选择文件喵~</button>
    </div>

    <div class="settings">
      <div class="setting-group">
        <label>图片尺寸:</label>
        <div class="custom-size">
          <input type="number" id="customWidth" placeholder="宽度" min="1">
          <span>×</span>
          <input type="number" id="customHeight" placeholder="高度" min="1">
          <button id="applyCustom">应用尺寸</button>
        </div>
      </div>

      <div class="setting-group">
        <label>保持宽高比:</label>
        <input type="checkbox" id="keepAspect" checked>
      </div>

      <div class="setting-group">
        <label>输出格式:</label>
        <select id="outputFormat">
          <option value="original">保持原格式</option>
          <option value="jpeg">JPEG</option>
          <option value="png">PNG</option>
          <option value="webp">WebP</option>
        </select>
      </div>

      <div class="setting-group">
        <label>转换模式:</label>
        <select id="convertMode">
          <option value="resize">调整尺寸并转换格式</option>
          <option value="format_only">仅转换格式（保持原尺寸）</option>
        </select>
      </div>

      <div class="setting-group">
        <label>自动处理:</label>
        <input type="checkbox" id="autoProcess">
        <span style="font-size: 12px; color: #666; margin-left: 5px;">添加图片后自动处理并输出</span>
      </div>

      <div class="setting-group">
        <label>保存文件夹:</label>
        <div style="display: flex; gap: 8px; align-items: center;">
          <input type="text" id="currentFolder" placeholder="默认下载文件夹" readonly style="flex: 1;">
          <button id="selectFolder" style="flex: 0 0 auto; padding: 8px 12px; font-size: 12px; white-space: nowrap;">请选择文件夹喵~</button>
        </div>
        <p style="font-size: 11px; color: #666; margin: 5px 0 0 0;">选择后文件将保存到该文件夹的子目录中</p>
      </div>
    </div>

    <div class="image-list" id="imageList">
      <!-- 图片列表会动态添加到这里 -->
    </div>

    <div class="action-buttons">
      <button id="processAll" disabled>批量处理所有图片</button>
      <button id="clearAll">清空列表</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
